<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>agent-control-tower</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel2: #1c2230;
        --border: #30363d;
        --text: #e6edf3;
        --dim: #8b949e;
        --accent: #58a6ff;
        --working: #3fb950;
        --waiting: #d29922;
        --error: #f85149;
        --idle: #6e7681;
        --crit: #f85149;
        --warn: #d29922;
        --info: #58a6ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      a { color: var(--accent); }
      .wrap { max-width: 1240px; margin: 0 auto; padding: 24px 20px 60px; }
      header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
      h1 { font-size: 20px; margin: 0; letter-spacing: -0.2px; }
      h1 .dot { color: var(--accent); }
      .sub { color: var(--dim); font-size: 13px; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .tag { font-size: 11px; border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; color: var(--dim); }
      .tag.on { color: var(--working); border-color: var(--working); }

      .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 8px; align-items: center; }
      .chip {
        display: inline-flex; align-items: center; gap: 7px;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 999px; padding: 5px 12px; font-size: 13px;
      }
      .chip.filter { cursor: pointer; user-select: none; }
      .chip.filter.off { opacity: 0.4; }
      .chip b { font-variant-numeric: tabular-nums; }
      .swatch { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
      .s-working { color: var(--working); } .bg-working { background: var(--working); }
      .s-waiting { color: var(--waiting); } .bg-waiting { background: var(--waiting); }
      .s-error { color: var(--error); } .bg-error { background: var(--error); }
      .s-idle { color: var(--idle); } .bg-idle { background: var(--idle); }

      .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 4px 0 16px; }
      input[type="search"], select {
        background: var(--panel); color: var(--text); border: 1px solid var(--border);
        border-radius: 8px; padding: 6px 10px; font-size: 13px;
      }
      input[type="search"] { min-width: 220px; }
      .spacer { flex: 1; }
      .live { font-size: 12px; color: var(--dim); display: inline-flex; align-items: center; gap: 6px; }
      .countdot { width: 8px; height: 8px; border-radius: 50%; background: var(--working); }
      .countdot.paused { background: var(--idle); }
      button.ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
      button.ghost:hover { border-color: var(--accent); }

      .bar { display: flex; height: 8px; border-radius: 6px; overflow: hidden; margin: 8px 0 18px; background: var(--panel); }
      .bar > span { display: block; }

      .alertbox { margin: 0 0 18px; }
      .alerthdr { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); margin: 2px 0 8px; }
      .alerts { display: flex; flex-direction: column; gap: 6px; }
      .alert { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); font-size: 13px; }
      .alert .sev { width: 8px; height: 8px; border-radius: 50%; flex: none; }
      .alert .who { color: var(--dim); min-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .sev-critical { background: var(--crit); } .sev-warn { background: var(--warn); } .sev-info { background: var(--info); }

      .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; align-items: start; }
      @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }
      .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 4px 0; }
      .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--dim); margin: 14px 16px 8px; }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 9px 14px; white-space: nowrap; }
      th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
      th:hover { color: var(--text); }
      th.sorted::after { content: " ▾"; color: var(--accent); }
      tbody tr { border-bottom: 1px solid #21262d; cursor: pointer; }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--panel2); }
      tbody tr.sel { background: var(--panel2); outline: 1px solid var(--accent); }
      td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: ui-monospace, Menlo, monospace; }
      .status-cell { font-weight: 600; }
      .glyph { display: inline-block; width: 1.2em; }
      .tool { color: var(--accent); font-family: ui-monospace, Menlo, monospace; }
      .stale { color: var(--waiting); }
      .rowbadge { color: var(--crit); }

      .chart { padding: 6px 12px 14px; }
      .chart svg { width: 100%; height: 140px; display: block; }
      .chart .axis { fill: var(--dim); font-size: 10px; }
      .chart .area { fill: rgba(88,166,255,0.18); }
      .chart .line { fill: none; stroke: var(--accent); stroke-width: 1.5; }

      .timeline { padding: 4px 16px 14px; max-height: 360px; overflow: auto; }
      .tlrow { display: flex; gap: 10px; padding: 4px 0; font-size: 12.5px; }
      .tlrow .t { color: var(--dim); font-family: ui-monospace, Menlo, monospace; }
      .tlrow .p { color: var(--dim); min-width: 120px; }
      .tlrow .l.err { color: var(--error); }

      /* Drill-down drawer */
      .drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; }
      .drawer-bg.open { display: block; }
      .drawer {
        position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 94vw);
        background: var(--bg); border-left: 1px solid var(--border); overflow: auto;
        padding: 20px; transform: translateX(100%); transition: transform 0.18s ease;
      }
      .drawer.open { transform: translateX(0); }
      .drawer h3 { margin: 0 0 2px; font-size: 17px; }
      .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 10px; font-size: 13px; margin: 14px 0; }
      .kv .k { color: var(--dim); }
      .seg { display: flex; gap: 8px; font-size: 12.5px; padding: 3px 0; }
      .seg .t { color: var(--dim); font-family: ui-monospace, Menlo, monospace; }
      .close { float: right; }

      footer { color: var(--dim); font-size: 12px; margin-top: 26px; }
      .empty { padding: 40px 16px; text-align: center; color: var(--dim); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1><span class="dot">▶</span> agent-control-tower</h1>
        <span class="sub" id="meta">connecting…</span>
        <span class="tag" id="sourcetag"></span>
        <span class="tag" id="controltag"></span>
      </header>

      <div class="chips" id="chips"></div>
      <div class="toolbar">
        <input type="search" id="search" placeholder="filter project / branch / model / tool…" autocomplete="off" />
        <button class="ghost" id="clearfilters">clear filters</button>
        <span class="spacer"></span>
        <span class="live"><span class="countdot" id="countdot"></span><span id="countlabel"></span></span>
        <label class="live">every
          <select id="interval">
            <option value="2000">2s</option>
            <option value="3000" selected>3s</option>
            <option value="5000">5s</option>
            <option value="10000">10s</option>
            <option value="0">paused</option>
          </select>
        </label>
        <button class="ghost" id="refreshnow">refresh</button>
      </div>
      <div class="bar" id="distbar"></div>
      <div class="alertbox" id="alertbox"></div>

      <div class="grid">
        <div class="panel">
          <h2>Agents <span class="sub" id="agentcount"></span></h2>
          <div id="tablewrap"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:18px;">
          <div class="panel">
            <h2>Cost over time</h2>
            <div class="chart" id="trend"></div>
          </div>
          <div class="panel">
            <h2>Recent activity</h2>
            <div class="timeline" id="timeline"></div>
          </div>
        </div>
      </div>

      <footer>
        Read-only · local-first · no telemetry · no outbound network. Reading
        <span class="mono" id="rootpath"></span>.
      </footer>
    </div>

    <div class="drawer-bg" id="drawerbg"></div>
    <aside class="drawer" id="drawer" aria-hidden="true"></aside>

    <script>
      const STATUSES = ['working', 'waiting', 'error', 'idle'];
      const GLYPH = { working: '▶', waiting: '⏸', error: '✖', idle: '·' };
      const STATUS_RANK = { working: 0, waiting: 1, error: 2, idle: 3 };

      const state = {
        sortKey: 'status',
        sortDir: 1,
        statusFilter: new Set(STATUSES),
        query: '',
        intervalMs: 3000,
        selectedId: null,
        timer: null,
        countdown: 0,
        fleet: null,
      };

      const fmtDur = (ms) => {
        if (!isFinite(ms) || ms < 0) return '—';
        if (ms < 1000) return Math.round(ms) + 'ms';
        const s = Math.floor(ms / 1000); if (s < 60) return s + 's';
        const m = Math.floor(s / 60); if (m < 60) return m + 'm ' + (s % 60) + 's';
        const h = Math.floor(m / 60); return h + 'h ' + String(m % 60).padStart(2, '0') + 'm';
      };
      const fmtTok = (n) => {
        if (!isFinite(n)) return '0';
        if (n < 1000) return String(Math.round(n));
        if (n < 1e6) return (n / 1e3).toFixed(1) + 'k';
        return (n / 1e6).toFixed(2) + 'M';
      };
      const fmtUsd = (n) => (!n ? '$0' : n < 1 ? '$' + n.toFixed(4) : '$' + n.toFixed(2));
      const fmtRel = (ts, now) => {
        if (!ts) return '—';
        const d = now - ts; if (d < 1000) return 'now';
        const s = Math.floor(d / 1000); if (s < 60) return s + 's ago';
        const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
        const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
        return Math.floor(h / 24) + 'd ago';
      };
      const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

      function matchesFilter(a) {
        if (!state.statusFilter.has(a.status)) return false;
        const q = state.query.trim().toLowerCase();
        if (!q) return true;
        return [a.project, a.slug, a.sessionId, a.gitBranch, a.model, a.currentTool]
          .some((v) => String(v ?? '').toLowerCase().includes(q));
      }

      function sortAgents(agents) {
        const a = [...agents];
        a.sort((x, y) => {
          let v;
          switch (state.sortKey) {
            case 'duration': v = y.turnDurationMs - x.turnDurationMs; break;
            case 'cost': v = x.cost.usd - y.cost.usd; break;
            case 'tokens': v = x.totalTokens - y.totalTokens; break;
            case 'project': v = String(x.project || x.sessionId).localeCompare(String(y.project || y.sessionId)); break;
            default: return (STATUS_RANK[x.status] - STATUS_RANK[y.status]) || (y.lastActivityAt - x.lastActivityAt);
          }
          return v * state.sortDir;
        });
        return a;
      }

      function renderChips(fleet) {
        const t = fleet.totals;
        const filters = STATUSES.map((s) => {
          const off = state.statusFilter.has(s) ? '' : ' off';
          return `<span class="chip filter${off}" data-status="${s}"><span class="swatch bg-${s}"></span><b>${t.byStatus[s]}</b> <span class="s-${s}">${s}</span></span>`;
        }).join('');
        document.getElementById('chips').innerHTML = filters +
          `<span class="chip">Σ <b>${t.agents}</b> agents</span>` +
          `<span class="chip">${fmtTok(t.totalTokens)} tokens</span>` +
          `<span class="chip">${fmtUsd(t.costUsd)} est.</span>`;
        document.querySelectorAll('.chip.filter').forEach((el) => {
          el.onclick = () => {
            const s = el.getAttribute('data-status');
            if (state.statusFilter.has(s)) state.statusFilter.delete(s); else state.statusFilter.add(s);
            render(state.fleet);
          };
        });
      }

      function renderDist(totals) {
        const n = Math.max(1, totals.agents);
        document.getElementById('distbar').innerHTML = STATUSES.map((s) => {
          const w = (100 * totals.byStatus[s]) / n;
          return w > 0 ? `<span class="bg-${s}" style="width:${w}%" title="${totals.byStatus[s]} ${s}"></span>` : '';
        }).join('');
      }

      function renderAlerts(fleet) {
        const el = document.getElementById('alertbox');
        const alerts = fleet.alerts || [];
        if (alerts.length === 0) { el.innerHTML = ''; return; }
        const s = fleet.alertSummary || { critical: 0, warn: 0, info: 0 };
        const parts = [];
        if (s.critical) parts.push(`${s.critical} critical`);
        if (s.warn) parts.push(`${s.warn} warn`);
        if (s.info) parts.push(`${s.info} info`);
        el.innerHTML = `<div class="alerthdr">⚠ alerts — ${parts.join(' · ')}</div>` +
          '<div class="alerts">' + alerts.slice(0, 12).map((a) =>
            `<div class="alert" data-id="${esc(a.sessionId)}"><span class="sev sev-${a.severity}"></span><span class="who" title="${esc(a.project || a.sessionId)}">${esc(a.project || a.sessionId)}</span><span>${esc(a.message)}</span></div>`
          ).join('') + '</div>';
        el.querySelectorAll('.alert[data-id]').forEach((el2) => {
          el2.onclick = () => openDrawer(el2.getAttribute('data-id'));
        });
      }

      function alertsBySession(fleet) {
        const m = {};
        for (const a of (fleet.alerts || [])) {
          const rank = { critical: 0, warn: 1, info: 2 };
          if (!(a.sessionId in m) || rank[a.severity] < rank[m[a.sessionId]]) m[a.sessionId] = a.severity;
        }
        return m;
      }

      function renderTable(fleet, now) {
        const cols = [
          ['status', 'Status'], ['project', 'Project'], ['branch', 'Branch'], ['model', 'Model'],
          ['tool', 'Tool'], ['duration', 'Turn'], ['tokens', 'Tokens'], ['cost', 'Cost'], ['last', 'Last'],
        ];
        const filtered = sortAgents(fleet.agents.filter(matchesFilter));
        document.getElementById('agentcount').textContent =
          filtered.length === fleet.agents.length ? `(${fleet.agents.length})` : `(${filtered.length} of ${fleet.agents.length})`;
        if (filtered.length === 0) {
          document.getElementById('tablewrap').innerHTML =
            `<div class="empty">${fleet.agents.length === 0 ? 'No agents found.<br/>Start a Claude Code session, or run with <span class="mono">--sample</span>.' : 'No agents match the current filter.'}</div>`;
          return;
        }
        const sev = alertsBySession(fleet);
        const head = cols.map(([k, label]) => `<th data-k="${k}" class="${k === state.sortKey ? 'sorted' : ''}">${label}</th>`).join('');
        const rows = filtered.map((a) => {
          const badge = sev[a.sessionId] ? ` <span class="rowbadge" title="has alerts">▲</span>` : '';
          const selCls = a.sessionId === state.selectedId ? ' class="sel"' : '';
          return `<tr data-id="${esc(a.sessionId)}"${selCls}>
            <td class="status-cell s-${a.status}"><span class="glyph">${GLYPH[a.status]}</span>${a.status}${badge}</td>
            <td title="${esc(a.cwd || '')}">${esc(a.project || a.slug || a.sessionId)}</td>
            <td class="mono">${esc(a.gitBranch || '—')}</td>
            <td>${esc(a.model || '—')}</td>
            <td class="tool">${esc(a.currentTool || '—')}</td>
            <td class="num">${fmtDur(a.turnDurationMs)}</td>
            <td class="num">${fmtTok(a.totalTokens)}</td>
            <td class="num">${a.cost.estimated ? '~' : ''}${fmtUsd(a.cost.usd)}</td>
            <td class="num">${fmtRel(a.lastActivityAt, now)}</td>
          </tr>`;
        }).join('');
        document.getElementById('tablewrap').innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
        document.querySelectorAll('th[data-k]').forEach((th) => {
          th.onclick = () => {
            const k = th.getAttribute('data-k');
            if (k === state.sortKey) state.sortDir = -state.sortDir; else { state.sortKey = k; state.sortDir = k === 'project' ? 1 : -1; }
            render(state.fleet);
          };
        });
        document.querySelectorAll('tr[data-id]').forEach((tr) => {
          tr.onclick = () => openDrawer(tr.getAttribute('data-id'));
        });
      }

      function renderTimeline(tl) {
        const rows = [...(tl.entries || [])].slice(-50).reverse();
        document.getElementById('timeline').innerHTML = rows.length === 0 ? '<div class="empty">—</div>' :
          rows.map((e) => {
            const t = e.tsIso ? e.tsIso.slice(11, 19) : '--:--:--';
            return `<div class="tlrow"><span class="t">${t}</span><span class="p">${esc(e.project || e.sessionId)}</span><span class="l ${e.isError ? 'err' : ''}">${esc(e.label)}</span></div>`;
          }).join('');
      }

      function renderTrend(trend) {
        const el = document.getElementById('trend');
        const pts = trend.points || [];
        if (pts.length < 2) { el.innerHTML = `<div class="empty">Not enough data yet for a trend.</div>`; return; }
        const W = 100, H = 40, pad = 2;
        const xs = pts.map((p) => p.ts), ys = pts.map((p) => p.cumulativeUsd);
        const x0 = Math.min(...xs), x1 = Math.max(...xs), y1 = Math.max(...ys, 1e-9);
        const sx = (x) => pad + (W - 2 * pad) * (x1 === x0 ? 0.5 : (x - x0) / (x1 - x0));
        const sy = (y) => H - pad - (H - 2 * pad) * (y / y1);
        const line = pts.map((p, i) => `${i ? 'L' : 'M'}${sx(p.ts).toFixed(2)},${sy(p.cumulativeUsd).toFixed(2)}`).join(' ');
        const area = `M${sx(x0).toFixed(2)},${(H - pad).toFixed(2)} ` +
          pts.map((p) => `L${sx(p.ts).toFixed(2)},${sy(p.cumulativeUsd).toFixed(2)}`).join(' ') +
          ` L${sx(x1).toFixed(2)},${(H - pad).toFixed(2)} Z`;
        const t0 = new Date(x0).toISOString().slice(11, 16), tN = new Date(x1).toISOString().slice(11, 16);
        el.innerHTML =
          `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path class="area" d="${area}"/><path class="line" d="${line}"/></svg>` +
          `<div class="sub" style="display:flex;justify-content:space-between;margin-top:4px;"><span>${t0}</span><span>total ${fmtUsd(ys[ys.length - 1])}</span><span>${tN}</span></div>`;
      }

      function renderDrawer(agent, replay, fleet) {
        const drawer = document.getElementById('drawer');
        if (!agent) { drawer.innerHTML = `<div class="empty">Session not found.</div>`; return; }
        const myAlerts = (fleet.alerts || []).filter((a) => a.sessionId === agent.sessionId);
        const tk = agent.tokens;
        const segs = [];
        if (replay) {
          let prev = null;
          for (const f of replay.frames) { if (f.status !== prev) { segs.push(f); prev = f.status; } }
        }
        drawer.innerHTML = `
          <button class="ghost close" id="closedrawer">× close</button>
          <h3>${esc(agent.project || agent.slug || agent.sessionId)}</h3>
          <div class="sub mono">${esc(agent.sessionId)}</div>
          <div class="kv">
            <span class="k">state</span><span class="s-${agent.status}">${GLYPH[agent.status]} ${agent.status} — ${esc(agent.reason)}</span>
            <span class="k">model</span><span>${esc(agent.model || '—')}</span>
            <span class="k">branch</span><span class="mono">${esc(agent.gitBranch || '—')}</span>
            <span class="k">cwd</span><span class="mono">${esc(agent.cwd || '—')}</span>
            <span class="k">turn</span><span>${fmtDur(agent.turnDurationMs)} · ${agent.messageCount} msgs · ${agent.subagentCount} subagents</span>
            <span class="k">tokens</span><span>in ${fmtTok(tk.input)} · out ${fmtTok(tk.output)} · cache-w ${fmtTok(tk.cacheWrite5m + tk.cacheWrite1h)} · cache-r ${fmtTok(tk.cacheRead)}</span>
            <span class="k">cost</span><span>${agent.cost.estimated ? '~' : ''}${fmtUsd(agent.cost.usd)}</span>
          </div>
          ${myAlerts.length ? `<div class="alerthdr">alerts</div>` + myAlerts.map((a) => `<div class="alert"><span class="sev sev-${a.severity}"></span><span>${esc(a.message)}</span></div>`).join('') : ''}
          <div class="alerthdr" style="margin-top:16px;">state transitions${replay ? ` (${segs.length} of ${replay.frames.length})` : ''}</div>
          ${segs.length ? segs.map((f) => `<div class="seg"><span class="t">${f.tsIso ? f.tsIso.slice(11, 19) : ''}</span><span class="s-${f.status}">${GLYPH[f.status]} ${f.status}</span><span class="sub">${esc(f.event)}</span></div>`).join('') : '<div class="sub">—</div>'}
          <div class="alerthdr" style="margin-top:16px;">session timeline</div>
          ${replay && replay.timeline.length ? replay.timeline.slice(-30).reverse().map((e) => `<div class="tlrow"><span class="t">${e.tsIso ? e.tsIso.slice(11, 19) : ''}</span><span class="l ${e.isError ? 'err' : ''}">${esc(e.label)}</span></div>`).join('') : '<div class="sub">—</div>'}
        `;
        document.getElementById('closedrawer').onclick = closeDrawer;
      }

      async function openDrawer(id) {
        state.selectedId = id;
        document.getElementById('drawerbg').classList.add('open');
        document.getElementById('drawer').classList.add('open');
        document.getElementById('drawer').setAttribute('aria-hidden', 'false');
        const agent = (state.fleet?.agents || []).find((a) => a.sessionId === id);
        document.getElementById('drawer').innerHTML = '<div class="empty">loading…</div>';
        let replay = null;
        try { replay = (await fetch('/api/agents/' + encodeURIComponent(id) + '/replay').then((r) => (r.ok ? r.json() : null)))?.replay ?? null; } catch (_e) { /* offline */ }
        renderDrawer(agent, replay, state.fleet || { alerts: [] });
        if (state.fleet) render(state.fleet); // reflect selection in the table
      }
      function closeDrawer() {
        state.selectedId = null;
        document.getElementById('drawerbg').classList.remove('open');
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawer').setAttribute('aria-hidden', 'true');
        if (state.fleet) render(state.fleet);
      }

      function render(fleet) {
        state.fleet = fleet;
        const now = fleet.now;
        renderChips(fleet);
        renderDist(fleet.totals);
        renderAlerts(fleet);
        renderTable(fleet, now);
      }

      async function refresh() {
        try {
          const [fleet, tl, trend] = await Promise.all([
            fetch('/api/fleet').then((r) => r.json()),
            fetch('/api/timeline?limit=80').then((r) => r.json()),
            fetch('/api/trend').then((r) => r.json()),
          ]);
          document.getElementById('meta').textContent =
            `${fleet.fileCount} session${fleet.fileCount === 1 ? '' : 's'}${fleet.sample ? ' · sample data' : ''}`;
          document.getElementById('sourcetag').textContent = fleet.sourceName || fleet.source || '';
          document.getElementById('rootpath').textContent = fleet.root;
          render(fleet);
          renderTimeline(tl);
          renderTrend(trend);
          // health → control state
          fetch('/api/health').then((r) => r.json()).then((h) => {
            const tag = document.getElementById('controltag');
            tag.textContent = h.control ? 'control ON' : 'control off';
            tag.className = 'tag' + (h.control ? ' on' : '');
          }).catch(() => {});
        } catch (e) {
          document.getElementById('meta').textContent = 'connection lost — retrying…';
        }
        state.countdown = state.intervalMs;
      }

      function tickCountdown() {
        const dot = document.getElementById('countdot');
        const label = document.getElementById('countlabel');
        if (state.intervalMs === 0) { dot.classList.add('paused'); label.textContent = 'paused'; return; }
        dot.classList.remove('paused');
        state.countdown = Math.max(0, state.countdown - 1000);
        label.textContent = 'live · next in ' + Math.ceil(state.countdown / 1000) + 's';
      }

      function reschedule() {
        if (state.timer) clearInterval(state.timer);
        if (state.intervalMs > 0) { state.timer = setInterval(refresh, state.intervalMs); }
      }

      document.getElementById('search').addEventListener('input', (e) => { state.query = e.target.value; if (state.fleet) render(state.fleet); });
      document.getElementById('clearfilters').onclick = () => {
        state.statusFilter = new Set(STATUSES); state.query = ''; document.getElementById('search').value = '';
        if (state.fleet) render(state.fleet);
      };
      document.getElementById('interval').addEventListener('change', (e) => { state.intervalMs = Number(e.target.value); reschedule(); state.countdown = state.intervalMs; });
      document.getElementById('refreshnow').onclick = refresh;
      document.getElementById('drawerbg').onclick = closeDrawer;
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

      refresh();
      reschedule();
      setInterval(tickCountdown, 1000);
    </script>
  </body>
</html>
